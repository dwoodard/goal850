title: 'Global Settings'
tabs:
  main:
    display: Main
    sections:
      -
        fields:
          -
            handle: site_name
            field:
              character_limit: 0
              type: text
              display: 'Goal 850'
          -
            handle: social
            field:
              add_row: 'Add Link'
              type: grid
              instructions: 'Set any social media links'
              display: Social
              fields:
                -
                  handle: name
                  field:
                    type: text
                    display: Name
                -
                  handle: url
                  field:
                    character_limit: 0
                    type: text
                    display: URL
                -
                  handle: icon
                  field:
                    container: assets
                    restrict: true
                    folder: site/social-icons
                    max_files: 1
                    type: assets
                    display: Icon
